<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GEMCO · Licitaciones próximas</title>
<style>
  :root{
    --bg:#f3f2fb; --card:#fff; --border:#e8e6f5; --text:#1f2144; --text-dim:#8a89a3;
    --violet:#6c5ce7; --violet-soft:#ece9fc; --teal:#17c3b2; --teal-soft:#e2f9f6;
    --urgent:#ef4d6b; --urgent-soft:#fde8ec; --soon:#f5a623; --soon-soft:#fef2df;
    --ok:#17c3b2; --shadow:0 4px 16px rgba(35,30,90,0.06);
    --font-display:'Poppins','Segoe UI',Arial,sans-serif; --font-body:'Inter','Segoe UI',Arial,sans-serif;
    --font-mono:'JetBrains Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column;padding:26px 40px 18px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--violet),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:16px}
  h1{font-family:var(--font-display);font-weight:600;font-size:22px}
  h1 span{color:var(--text-dim);font-weight:400;font-size:15px;display:block;margin-top:1px}
  .meta{text-align:right;color:var(--text-dim);font-size:13px;font-family:var(--font-mono)}
  .meta strong{color:var(--text)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;flex-shrink:0}
  .kpi-card{background:var(--card);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px}
  .kpi-card .icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:4px}
  .kpi-card.violet .icon{background:var(--violet-soft);color:var(--violet)}
  .kpi-card.teal .icon{background:var(--teal-soft);color:var(--teal)}
  .kpi-card.urgent .icon{background:var(--urgent-soft);color:var(--urgent)}
  .kpi-card.soon .icon{background:var(--soon-soft);color:var(--soon)}
  .kpi-label{font-size:12.5px;color:var(--text-dim);font-weight:500}
  .kpi-value{font-family:var(--font-display);font-size:24px;font-weight:600}
  .kpi-sub{font-size:12px;color:var(--text-dim)}
  .slide-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-shrink:0}
  .slide-header h2{font-family:var(--font-display);font-weight:600;font-size:17px}
  .slide-header .badge{font-size:12px;font-weight:600;color:#fff;background:var(--violet);padding:3px 11px;border-radius:20px}
  .slide-header.pending .badge{background:var(--soon)}
  .slide-header .subtitle{color:var(--text-dim);font-size:13px}
  .stage{position:relative;flex:1;min-height:0}
  .slide{position:absolute;inset:0;opacity:0;transform:translateY(14px);transition:opacity .6s ease,transform .6s ease;pointer-events:none}
  .slide.active{opacity:1;transform:translateY(0);pointer-events:auto}
  .card-table{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;height:100%;display:flex;flex-direction:column}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  thead th{text-align:left;font-size:11.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim);font-weight:600;padding:12px 18px;border-bottom:1px solid var(--border)}
  col.col-urg{width:5px} col.col-linea{width:13%} col.col-nombre{width:auto} col.col-fecha{width:16%} col.col-monto{width:13%} col.col-vendedor{width:13%}
  tbody tr{border-bottom:1px solid var(--border)} tbody tr:last-child{border-bottom:none}
  tbody td{padding:13px 18px;font-size:15px;vertical-align:middle;overflow:hidden}
  .col-urgencia{width:5px;padding:0}
  .urgencia-bar{width:5px;height:100%;display:block;min-height:44px;border-radius:3px}
  .urgencia-bar.urgent{background:var(--urgent)} .urgencia-bar.soon{background:var(--soon)} .urgencia-bar.ok{background:var(--ok)}
  .linea-tag{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--violet-soft);color:var(--violet);white-space:nowrap}
  .nombre{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cliente{color:var(--text-dim);font-size:12.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fecha{font-family:var(--font-mono);font-size:13.5px;white-space:nowrap}
  .fecha .dias{display:block;font-size:11.5px;margin-top:3px;font-family:var(--font-body);font-weight:600}
  .dias.urgent{color:var(--urgent)} .dias.soon{color:var(--soon)} .dias.ok{color:var(--text-dim);font-weight:500}
  .monto{font-family:var(--font-mono);font-size:14px;text-align:right;white-space:nowrap}
  .monto.na{color:var(--text-dim);font-family:var(--font-body);font-size:13px}
  .vendedor{color:var(--text-dim);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  tbody tr.filler{visibility:hidden}
  footer{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px}
  .progress-dot{width:30px;height:5px;border-radius:3px;background:var(--border);overflow:hidden;position:relative}
  .progress-dot .fill{position:absolute;inset:0;background:var(--violet);transform:scaleX(0);transform-origin:left}
  .progress-dot.done .fill{transform:scaleX(1);transition:none}
  .progress-dot.active .fill{transform:scaleX(0);animation:fillbar 12s linear forwards}
  @keyframes fillbar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">G</div>
    <h1>Licitaciones GEMCO<span>Panel de seguimiento · próximos 20 días</span></h1>
  </div>
  <div class="meta">Actualizado<br><strong id="ts-generado">—</strong></div>
</header>
<div class="kpis" id="kpis"></div>
<div class="slide-header" id="slide-header">
  <h2 id="slide-title">—</h2>
  <span class="badge" id="slide-badge">0</span>
  <span class="subtitle" id="slide-subtitle"></span>
</div>
<div class="stage" id="stage"></div>
<footer id="progress"></footer>
<script>
const LICITACIONES_DATA = {"confirmadas": [{"id": "1057499-28-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD SUR UNIDAD HOSPITALARI - Bienes y Servicios", "nombre": "", "fecha": "2026-07-13T15:01", "monto": null, "vendedor": "Camila Olave", "estado": "Confirmada"}, {"id": "1641-265-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD OCCIDENTE HOSPITAL SAN JUAN DE DIOS", "nombre": "", "fecha": "2026-07-13T17:00", "monto": null, "vendedor": "Cesibel Sevilla", "estado": "Confirmada"}, {"id": "2126-84-LR26", "linea": "—", "cliente": "SERVICIO DE SALUD COQUIMBO HOSPITAL DE COQUIMBO", "nombre": "", "fecha": "2026-07-15T17:00", "monto": null, "vendedor": "Alan Osorio", "estado": "Confirmada"}, {"id": "1058900-9-LE26", "linea": "—", "cliente": "UNIVERSIDAD DE LA SERENA - DEPARTAMENTO DE ODONTOLOGÍA", "nombre": "", "fecha": "2026-07-17T15:01", "monto": null, "vendedor": "Néstor San Martín", "estado": "Confirmada"}, {"id": "2080-198-LP26", "linea": "—", "cliente": ": SERVICIO DE SALUD DEL LIBERTADOR B O'HIGGINS HOSPITAL REG RANCAGUA", "nombre": "", "fecha": "2026-07-17T16:00", "monto": null, "vendedor": "Claudia Kiger", "estado": "Confirmada"}, {"id": "4967-20-LR26", "linea": "—", "cliente": "HOSPITAL DE QUILPUÉ", "nombre": "", "fecha": "2026-07-17T16:00", "monto": null, "vendedor": "Alan Osorio", "estado": "Confirmada"}, {"id": "1554-40-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD ATACAMA HOSPITAL COPIA", "nombre": "", "fecha": "2026-07-17T20:00", "monto": null, "vendedor": "Luis Guajardo", "estado": "Confirmada"}, {"id": "699866-102-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD DEL MAULE HOSPITAL DE TALCA", "nombre": "", "fecha": "2026-07-20T12:30", "monto": null, "vendedor": "Sebastián Durán", "estado": "Confirmada"}, {"id": "1549-56-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD METROPOLITANA NORTE HOSPITAL SAN JOSE", "nombre": "", "fecha": "2026-07-20T15:04", "monto": null, "vendedor": "Cesibel Sevilla", "estado": "Confirmada"}, {"id": "1057049-212-LP26", "linea": "—", "cliente": "SERV SALUD METROPOLITANO CENTRAL HOSPITAL CLINICO SAN BORJA ARRIARAN", "nombre": "", "fecha": "2026-07-20T15:30", "monto": null, "vendedor": "Cesibel Sevilla", "estado": "Confirmada"}, {"id": "1057544-222-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD DE TALCAHUANO HOSPITAL", "nombre": "", "fecha": "2026-07-21T15:00", "monto": null, "vendedor": "Jennifer Ilufi", "estado": "Confirmada"}, {"id": "1057501-357-LP26", "linea": "—", "cliente": "COMPLEJO ASISTENCIAL DR. SOTERO DEL RIO", "nombre": "", "fecha": "2026-07-23T15:00", "monto": null, "vendedor": "Camilo Jofré", "estado": "Confirmada"}, {"id": "1057472-88-LR26", "linea": "—", "cliente": "Hospital Clínico Metropolitano El Carmen Doctor Luis Valentín Ferrada", "nombre": "", "fecha": "2026-07-27T18:00", "monto": null, "vendedor": "Claudia Kiger", "estado": "Confirmada"}, {"id": "1057536-82-LP26", "linea": "—", "cliente": "SERVICIO SALUD DEL RELONCAVI", "nombre": "", "fecha": "2026-07-30T16:00", "monto": null, "vendedor": "Luis Guajardo", "estado": "Confirmada"}, {"id": "1057472-35-LR26", "linea": "—", "cliente": "Hospital Clínico Metropolitano El Carmen Doctor Luis Valentín Ferrada", "nombre": "", "fecha": "2026-07-30T17:00", "monto": null, "vendedor": "Alexandra Mera ", "estado": "Confirmada"}, {"id": "1447792-11-LR26", "linea": "—", "cliente": "SERVICIO DE SALUD METROPOLITANO SUR ORIENTE", "nombre": "", "fecha": "2026-07-31T15:01", "monto": null, "vendedor": "Daniela Muñoz", "estado": "Confirmada"}], "sin_confirmar": [{"id": "1057370-20-L126", "linea": "—", "cliente": "HOSPITAL PSIQUIATRICO DR. PHILIPPE PINEL PUTAENDO", "nombre": "", "fecha": "2026-07-15T15:00", "monto": null, "vendedor": "Cristian Pérez", "estado": "Sin confirmar"}, {"id": "1705-17-L126", "linea": "—", "cliente": "HOSPITAL ADRIANA COUSINO DE QUINTERO", "nombre": "", "fecha": "2026-07-17T15:00", "monto": null, "vendedor": "Cristian Pérez", "estado": "Sin confirmar"}, {"id": "2887-12-LE26", "linea": "—", "cliente": "I MUNICIPALIDAD DE PUYEHUE - DEPARTAMENTO DE SALUD", "nombre": "", "fecha": "2026-07-17T15:01", "monto": null, "vendedor": "Luis Guajardo", "estado": "Sin confirmar"}, {"id": "545598-28-LE26", "linea": "—", "cliente": "CORP MUNICIPAL DE CASTRO PARA LA EDUCACION SALUD Y ATENCION AL MENOR", "nombre": "", "fecha": "2026-07-20T15:15", "monto": null, "vendedor": "Luis Guajardo", "estado": "Sin confirmar"}, {"id": "1180703-22-LE26", "linea": "—", "cliente": "SERVICIO DE SALUD DE ARICA Y PARINACOTA", "nombre": "", "fecha": "2026-07-20T15:30", "monto": null, "vendedor": "Alexandra Mera ", "estado": "Sin confirmar"}, {"id": "2258-113-LR26", "linea": "—", "cliente": "SERVICIO DE SALUD ANTOFAGASTA HOSPITAL L", "nombre": "", "fecha": "2026-07-21T15:11", "monto": null, "vendedor": "Claudia Kiger", "estado": "Sin confirmar"}, {"id": "1057937-3-LE26", "linea": "—", "cliente": "SERVICIO DE SALUD VALDIVIA HOSPITAL BASE", "nombre": "", "fecha": "2026-07-21T19:00", "monto": null, "vendedor": "Luis Guajardo", "estado": "Sin confirmar"}, {"id": "2126-108-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD COQUIMBO HOSPITAL DE COQUIMBO", "nombre": "", "fecha": "2026-07-22T15:10", "monto": null, "vendedor": "Alan Osorio", "estado": "Sin confirmar"}, {"id": "699866-93-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD DEL MAULE HOSPITAL DE TALCA", "nombre": "", "fecha": "2026-07-22T15:30", "monto": null, "vendedor": "Alan Osorio", "estado": "Sin confirmar"}, {"id": "1175-53-LP26", "linea": "—", "cliente": "SERVICIO DE SALUD ARAUCANIA SUR", "nombre": "", "fecha": "2026-07-24T15:30", "monto": null, "vendedor": "Jennifer Ilufi", "estado": "Sin confirmar"}, {"id": "1057402-116-LE26", "linea": "—", "cliente": "HOSPITAL CLINICO DE MAGALLANES DR. LAUTARO NAVARRO AVARIA", "nombre": "", "fecha": "2026-07-28T15:00", "monto": null, "vendedor": "Mauricio Muñoz", "estado": "Sin confirmar"}, {"id": "1514-90-LP26", "linea": "—", "cliente": "Hospital de Castro", "nombre": "", "fecha": "2026-07-30T15:06", "monto": null, "vendedor": "Claudia Kiger", "estado": "Sin confirmar"}], "generado": "2026-07-12 21:54"};
const FILAS_POR_SLIDE = 8;
const SEGUNDOS_POR_SLIDE = 12;

function urgenciaClase(f){const a=new Date(LICITACIONES_DATA.generado.replace(' ','T'));const d=(new Date(f)-a)/864e5;return d<=2?'urgent':d<=5?'soon':'ok'}
function formatFecha(f){return new Date(f).toLocaleString('es-CL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).replace('.','')}
function diasRestantes(f){const a=new Date(LICITACIONES_DATA.generado.replace(' ','T'));const d=Math.ceil((new Date(f)-a)/864e5);return d<=0?'Cierra hoy':d===1?'Cierra mañana':`Cierra en ${d} días`}
function formatMonto(m){return m?('$'+m.toLocaleString('es-CL')):'<span class="monto na">Sin dato</span>'}
function formatMontoCorto(m){return m?(m>=1e6?'$'+(m/1e6).toFixed(1).replace('.0','')+'M':'$'+m.toLocaleString('es-CL')):'—'}

function construirKPIs(){
  const c=LICITACIONES_DATA.confirmadas,p=LICITACIONES_DATA.sin_confirmar;
  const u=[...c,...p].filter(x=>urgenciaClase(x.fecha)==='urgent');
  const montoTotal=c.reduce((s,x)=>s+(x.monto||0),0);
  const cards=[
    {clase:'violet',icono:'✓',label:'Confirmadas',valor:c.length,sub:'en ventana de 20 días'},
    {clase:'soon',icono:'?',label:'Por confirmar',valor:p.length,sub:'pendientes de estado'},
    {clase:'urgent',icono:'!',label:'Cierran en ≤2 días',valor:u.length,sub:'requieren atención'},
    {clase:'teal',icono:'$',label:'Monto confirmado',valor:formatMontoCorto(montoTotal),sub:'con dato disponible'},
  ];
  document.getElementById('kpis').innerHTML=cards.map(x=>`<div class="kpi-card ${x.clase}"><div class="icon">${x.icono}</div><div class="kpi-label">${x.label}</div><div class="kpi-value">${x.valor}</div><div class="kpi-sub">${x.sub}</div></div>`).join('');
}

function construirTablaHTML(lista){
  const filas=lista.map(item=>{
    const urg=urgenciaClase(item.fecha);
    return `<tr><td class="col-urgencia"><span class="urgencia-bar ${urg}"></span></td><td><span class="linea-tag">${item.linea}</span></td><td><div class="nombre">${item.nombre||'(sin nombre)'}</div><div class="cliente">${item.cliente||''}</div></td><td class="fecha">${formatFecha(item.fecha)}<span class="dias ${urg}">${diasRestantes(item.fecha)}</span></td><td class="monto">${formatMonto(item.monto)}</td><td class="vendedor">${item.vendedor}</td></tr>`;
  }).join('');
  let fillers='';
  for(let i=0;i<FILAS_POR_SLIDE-lista.length;i++) fillers+='<tr class="filler"><td></td><td></td><td>&nbsp;</td><td></td><td></td><td></td></tr>';
  return `<div class="card-table"><table><colgroup><col class="col-urg"><col class="col-linea"><col class="col-nombre"><col class="col-fecha"><col class="col-monto"><col class="col-vendedor"></colgroup><thead><tr><th></th><th>Línea</th><th>Licitación</th><th>Cierre</th><th style="text-align:right">Monto est.</th><th>Vendedor</th></tr></thead><tbody>${filas}${fillers}</tbody></table></div>`;
}

function chunk(a,s){const o=[];for(let i=0;i<a.length;i+=s)o.push(a.slice(i,i+s));return o}

const cC=chunk(LICITACIONES_DATA.confirmadas,FILAS_POR_SLIDE);
const cP=chunk(LICITACIONES_DATA.sin_confirmar,FILAS_POR_SLIDE);
const slides=[];
cC.forEach((c,i)=>slides.push({tipo:'confirmadas',datos:c,titulo:'Confirmadas',parte:cC.length>1?`${i+1}/${cC.length}`:null,total:LICITACIONES_DATA.confirmadas.length}));
cP.forEach((c,i)=>slides.push({tipo:'pendientes',datos:c,titulo:'Por confirmar',parte:cP.length>1?`${i+1}/${cP.length}`:null,total:LICITACIONES_DATA.sin_confirmar.length}));

const stage=document.getElementById('stage'),slideHeader=document.getElementById('slide-header'),slideTitle=document.getElementById('slide-title'),slideBadge=document.getElementById('slide-badge'),slideSubtitle=document.getElementById('slide-subtitle'),progress=document.getElementById('progress');

construirKPIs();
slides.forEach((s,i)=>{const d=document.createElement('div');d.className='slide';d.id=`slide-${i}`;d.innerHTML=construirTablaHTML(s.datos);stage.appendChild(d)});
slides.forEach((s,i)=>{const d=document.createElement('div');d.className='progress-dot';d.id=`dot-${i}`;d.innerHTML='<span class="fill"></span>';progress.appendChild(d)});

let current=0;
function showSlide(idx){
  slides.forEach((s,i)=>{document.getElementById(`slide-${i}`).classList.toggle('active',i===idx);const dot=document.getElementById(`dot-${i}`);dot.classList.remove('active');dot.classList.toggle('done',i<idx)});
  const dotActive=document.getElementById(`dot-${idx}`);dotActive.classList.remove('done');void dotActive.offsetWidth;dotActive.classList.add('active');
  const s=slides[idx];slideTitle.textContent=s.titulo;slideBadge.textContent=s.total;slideSubtitle.textContent=s.parte?`Pantalla ${s.parte}`:'';slideHeader.classList.toggle('pending',s.tipo==='pendientes');
}
if(slides.length>0){showSlide(0);setInterval(()=>{current=(current+1)%slides.length;showSlide(current)},SEGUNDOS_POR_SLIDE*1000)}
document.getElementById('ts-generado').textContent=LICITACIONES_DATA.generado;

// Auto-refresh de la página cada 30 minutos, para levantar datos nuevos del script diario
setTimeout(()=>location.reload(), 30*60*1000);
</script>
</body>
</html>
